name: 📁 Check folder icon structure

on:
  pull_request:
    paths:
      - "icons/folder-*.svg"

permissions:
  contents: read

jobs:
  folder-structure-check:
    name: Folder Icon Structure Check

    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.node-version'
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 📁 Check folder icon structure
        run: npx tsx ./src/scripts/icons/checks/checkFolderIconStructure.ts
