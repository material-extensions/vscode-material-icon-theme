name: 📁 Check folder icon structure

on:
  pull_request:
    paths:
      - "icons/folder-*.svg"

permissions:
  contents: read

jobs:
  folder-structure-check:
    name: Folder Icon Structure Check

    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6.1.0

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
        with:
          node-version-file: '.node-version'
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 📁 Check folder icon structure
        run: npx tsx ./src/scripts/icons/checks/checkFolderIconStructure.ts
