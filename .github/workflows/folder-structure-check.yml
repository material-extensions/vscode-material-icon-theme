name: 📁 Check folder icon structure

on:
  pull_request:
    paths:
      - "icons/folder-*.svg"

permissions:
  contents: read

jobs:
  folder-structure-check:
    name: Folder Icon Structure Check

    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: '.node-version'
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 📁 Check folder icon structure
        run: npx tsx ./src/scripts/icons/checks/checkFolderIconStructure.ts
